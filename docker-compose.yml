version: '3.8'

services:

  # ── PHP Application ──────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biteplate_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - biteplate_network

  # ── Nginx Web Server ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: biteplate_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - biteplate_network

  # ── PostgreSQL Database ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: biteplate_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: biteplate
      POSTGRES_USER: biteplate
      POSTGRES_PASSWORD: biteplate_secret
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biteplate -d biteplate"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - biteplate_network

  # ── Redis (Queue / Cache) ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: biteplate_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - biteplate_network

  # ── Queue Worker (Command Pattern) ───────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biteplate_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    depends_on:
      - app
      - redis
      - postgres
    networks:
      - biteplate_network

  # ── pgAdmin (PostgreSQL GUI) ──────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: biteplate_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@biteplate.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - biteplate_network

# ── Volumes ───────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ── Networks ──────────────────────────────────────────
networks:
  biteplate_network:
    driver: bridge
